name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors (E9)
        # we exclude benchmarks and results to avoid noise from legacy/generated code
        flake8 . --count --select=E9 --exclude=benchmarks,results,humaneval-loki-solutions --show-source --statistics
        # exit-zero treats all other errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      env:
        OPENAI_API_KEY: sk-dummy
        ANTHROPIC_API_KEY: sk-dummy
        ASTRAFLOW_API_KEY: sk-dummy
        ASTRAFLOW_CN_API_KEY: sk-dummy
      run: |
        pytest
